[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@chainlink/=lib/chainlink-brownie-contracts/contracts/src/v0.8/",
]

# Allow the deploy script to write deployments.json to the frontend directory
fs_permissions = [{ access = "write", path = "../frontend/lib/" }]


[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
